<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Recommender</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 30px;
        }

        form {
            margin: 30px auto;
        }

        select {
            padding: 10px;
            width: 320px;
            font-size: 16px;
            border-radius: 6px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
            border: none;
            border-radius: 6px;
            background: #22c55e;
            color: #000;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .movies {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: #1e293b;
            width: 180px;
            border-radius: 10px;
            padding: 10px;
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card p {
            margin-top: 10px;
            font-size: 14px;
        }

        footer {
            margin: 40px 0;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <h1>🎬 Movie Recommender System</h1>

    <form method="POST">
        <select name="movie" required>
            <option value="" disabled selected>Select a movie</option>
            {% for movie in movie_list %}
                <option value="{{ movie }}">{{ movie }}</option>
            {% endfor %}
        </select>

        <button type="submit">Recommend</button>
    </form>

    {% if recommendations %}
        <h2>Recommended Movies</h2>

        <div class="movies">
            {% for rec in recommendations %}
                <div class="card">
                    {% if rec.poster %}
                        <img src="{{ rec.poster }}" alt="{{ rec.title }}">
                    {% else %}
                        <div style="height:260px; display:flex; align-items:center; justify-content:center; background:#334155; border-radius:8px;">
                            No Image
                        </div>
                    {% endif %}
                    <p>{{ rec.title }}</p>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <footer>
        Made with ❤️ using Flask & ML
    </footer>

</body>
</html>
